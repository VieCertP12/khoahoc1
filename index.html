<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Cyberpunk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans selection:bg-purple-500">

    <header class="border-b border-gray-800 backdrop-blur-md sticky top-0 z-50 bg-gray-950/80">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent italic">TECH-X</div>
            <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-bold">
                <a href="#" class="hover:text-purple-400 transition">Khám phá</a>
                <a href="#" class="hover:text-purple-400 transition">Tính năng</a>
                <a href="#" class="hover:text-purple-400 transition">Cộng đồng</a>
            </div>
            <button class="border-2 border-purple-500 text-purple-400 px-6 py-1.5 rounded-full hover:bg-purple-500 hover:text-white transition-all font-bold">VÀO APP</button>
        </nav>
    </header>

    <main>
        <section class="container mx-auto px-6 py-28 text-center relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-purple-600/20 blur-[120px] rounded-full -z-10"></div>
            <h1 class="text-6xl md:text-8xl font-black mb-8 tracking-tighter">
                KỶ NGUYÊN <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">VÔ TẬN</span>
            </h1>
            <p class="text-lg text-gray-400 mb-12 max-w-xl mx-auto leading-relaxed">
                Đánh thức tiềm năng dữ liệu với nền tảng phân tích AI thế hệ mới. Trực quan, mạnh mẽ và hoàn toàn miễn phí.
            </p>
            <div class="flex flex-col md:flex-row justify-center gap-6">
                <button class="bg-gradient-to-r from-purple-600 to-pink-600 px-10 py-4 rounded-xl font-bold hover:scale-105 transition-transform shadow-[0_0_20px_rgba(168,85,247,0.4)]">Bắt đầu ngay</button>
                <button class="bg-gray-800 hover:bg-gray-700 px-10 py-4 rounded-xl font-bold transition">Tài liệu API</button>
            </div>
        </section>

        <section class="container mx-auto px-6 py-12">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                <div class="bg-gray-900/50 p-8 rounded-3xl border border-gray-800">
                    <div class="text-4xl font-black text-purple-500 mb-1">99%</div>
                    <div class="text-xs uppercase text-gray-500 tracking-widest">Uptime</div>
                </div>
                <div class="bg-gray-900/50 p-8 rounded-3xl border border-gray-800">
                    <div class="text-4xl font-black text-pink-500 mb-1">2M+</div>
                    <div class="text-xs uppercase text-gray-500 tracking-widest">Users</div>
                </div>
                <div class="bg-gray-900/50 p-8 rounded-3xl border border-gray-800">
                    <div class="text-4xl font-black text-blue-500 mb-1">50ms</div>
                    <div class="text-xs uppercase text-gray-500 tracking-widest">Latency</div>
                </div>
                <div class="bg-gray-900/50 p-8 rounded-3xl border border-gray-800">
                    <div class="text-4xl font-black text-green-500 mb-1">Free</div>
                    <div class="text-xs uppercase text-gray-500 tracking-widest">Tài khoản</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-600 text-sm">
        <p>© 2026 TECH-X LABS. Built with Passion & Code.</p>
    </footer>

</body>
</html>
